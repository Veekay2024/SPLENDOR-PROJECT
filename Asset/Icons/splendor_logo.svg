<svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="200" fill="#0a0a0a"/>
  
  <!-- Decorative elements -->
  <circle cx="200" cy="100" r="70" fill="none" stroke="url(#goldGradient)" stroke-width="0.5" opacity="0.3"/>
  <circle cx="200" cy="100" r="55" fill="none" stroke="url(#goldGradient)" stroke-width="0.5" opacity="0.4"/>
  
  <!-- Starburst accent top left -->
  <g transform="translate(200, 100)" opacity="0.6">
    <line x1="0" y1="-60" x2="0" y2="-65" stroke="url(#goldGradient)" stroke-width="1.5"/>
    <line x1="42" y1="-42" x2="46" y2="-46" stroke="url(#goldGradient)" stroke-width="1.5"/>
    <line x1="60" y1="0" x2="65" y2="0" stroke="url(#goldGradient)" stroke-width="1.5"/>
    <line x1="42" y1="42" x2="46" y2="46" stroke="url(#goldGradient)" stroke-width="1.5"/>
    <line x1="0" y1="60" x2="0" y2="65" stroke="url(#goldGradient)" stroke-width="1.5"/>
    <line x1="-42" y1="42" x2="-46" y2="46" stroke="url(#goldGradient)" stroke-width="1.5"/>
    <line x1="-60" y1="0" x2="-65" y2="0" stroke="url(#goldGradient)" stroke-width="1.5"/>
    <line x1="-42" y1="-42" x2="-46" y2="-46" stroke="url(#goldGradient)" stroke-width="1.5"/>
  </g>
  
  <!-- Center diamond icon -->
  <g transform="translate(200, 100)">
    <path d="M 0,-15 L 10,-5 L 0,15 L -10,-5 Z" fill="url(#goldGradient)" opacity="0.9"/>
    <path d="M 0,-15 L 10,-5 L 0,15 L -10,-5 Z" fill="none" stroke="#d4af37" stroke-width="0.5"/>
  </g>
  
  <!-- Main text -->
  <text x="200" y="140" font-family="'Playfair Display', 'Georgia', serif" font-size="42" font-weight="300" fill="url(#goldGradient)" text-anchor="middle" letter-spacing="8">
    SPLENDOR
  </text>
  
  <!-- Decorative underline -->
  <line x1="100" y1="150" x2="300" y2="150" stroke="url(#goldGradient)" stroke-width="0.5" opacity="0.5"/>
  
  <!-- Small accent dots -->
  <circle cx="95" cy="150" r="1.5" fill="url(#goldGradient)"/>
  <circle cx="305" cy="150" r="1.5" fill="url(#goldGradient)"/>
  
  <!-- Tagline -->
  <text x="200" y="165" font-family="'Montserrat', 'Arial', sans-serif" font-size="8" font-weight="300" fill="#c9b037" text-anchor="middle" letter-spacing="3" opacity="0.8">
    LUXURY REDEFINED
  </text>
  
  <!-- Gradients -->
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f4e5c3;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4af37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c9b037;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>